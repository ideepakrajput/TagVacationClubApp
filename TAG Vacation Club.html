<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TAG Vacation Club · Mobile App Design</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- iOS frame + design canvas + TAG system + screens -->
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tag-system.jsx"></script>
<script type="text/babel" src="tag-screens-1.jsx"></script>
<script type="text/babel" src="tag-screens-2.jsx"></script>
<script type="text/babel" src="tag-screens-3.jsx"></script>
<script type="text/babel" src="tag-prototype.jsx"></script>

<script type="text/babel" data-presets="env,react">
const PH = 844, PW = 390;

function App() {
  return (
    <DesignCanvas>
      {/* Brand foundation */}
      <DCSection id="brand" title="Design system" subtitle="TAG · v1.0 · light mode foundation">
        <DCArtboard id="poster" label="Foundation poster" width={1240} height={880}>
          <DesignSystemPoster />
        </DCArtboard>
      </DCSection>

      {/* Interactive prototype */}
      <DCSection id="proto" title="Interactive prototype" subtitle="Tap left/right edges of the device to step through the core flow">
        <DCArtboard id="flow" label="Splash → Login → Dashboard → Book → Confirm" width={PW} height={PH}>
          <TagPrototype />
        </DCArtboard>
      </DCSection>

      {/* Entry */}
      <DCSection id="entry" title="Entry" subtitle="Splash · 3-step onboarding · sign in">
        <DCArtboard id="splash" label="01 · Splash" width={PW} height={PH}><ScreenSplash /></DCArtboard>
        <DCArtboard id="ob1" label="02a · Onboarding · Resorts" width={PW} height={PH}><ScreenOnboarding slide={1} /></DCArtboard>
        <DCArtboard id="ob2" label="02b · Onboarding · Flexibility" width={PW} height={PH}><ScreenOnboarding slide={2} /></DCArtboard>
        <DCArtboard id="ob3" label="02c · Onboarding · Privileges" width={PW} height={PH}><ScreenOnboarding slide={3} /></DCArtboard>
        <DCArtboard id="login" label="03 · Sign in" width={PW} height={PH}><ScreenLogin /></DCArtboard>
      </DCSection>

      {/* Home */}
      <DCSection id="home" title="Dashboard" subtitle="Hero carousel · quick tiles · holiday balance · upcoming trip">
        <DCArtboard id="dash" label="04 · Home" width={PW} height={PH}><ScreenDashboard /></DCArtboard>
        <DCArtboard id="dash-dark" label="04b · Home · Dark mode" width={PW} height={PH}><ScreenDashboard dark /></DCArtboard>
      </DCSection>

      {/* Member */}
      <DCSection id="member" title="Membership" subtitle="Profile · membership card · package usage · documents">
        <DCArtboard id="profile" label="05 · Profile" width={PW} height={PH}><ScreenProfile /></DCArtboard>
        <DCArtboard id="profile-dark" label="05b · Profile · Dark" width={PW} height={PH}><ScreenProfile dark /></DCArtboard>
        <DCArtboard id="member-details" label="06 · Membership details" width={PW} height={PH}><ScreenMembershipDetails /></DCArtboard>
        <DCArtboard id="package" label="07 · Package & usage" width={PW} height={PH}><ScreenPackageUsage /></DCArtboard>
        <DCArtboard id="ekit" label="12 · E-Kit & documents" width={PW} height={PH}><ScreenEKit /></DCArtboard>
      </DCSection>

      {/* Booking flow */}
      <DCSection id="booking" title="Booking flow" subtitle="Search → resort list → detail → summary → confirmation">
        <DCArtboard id="search" label="08a · Search" width={PW} height={PH}><ScreenBookSearch /></DCArtboard>
        <DCArtboard id="search-dark" label="08a · Search · Dark" width={PW} height={PH}><ScreenBookSearch dark /></DCArtboard>
        <DCArtboard id="list" label="08b · Resort list" width={PW} height={PH}><ScreenBookList /></DCArtboard>
        <DCArtboard id="detail" label="08c · Resort detail" width={PW} height={PH}><ScreenResortDetail /></DCArtboard>
        <DCArtboard id="summary" label="08d · Summary" width={PW} height={PH}><ScreenBookSummary /></DCArtboard>
        <DCArtboard id="confirm" label="08e · Confirmation" width={PW} height={PH}><ScreenBookConfirm /></DCArtboard>
      </DCSection>

      {/* Engagement */}
      <DCSection id="engage" title="Trips · offers · wallet" subtitle="Returning-user surfaces">
        <DCArtboard id="trips" label="09 · My trips" width={PW} height={PH}><ScreenMyBookings /></DCArtboard>
        <DCArtboard id="offers" label="10 · Offers" width={PW} height={PH}><ScreenOffers /></DCArtboard>
        <DCArtboard id="payment" label="11 · Payment & wallet" width={PW} height={PH}><ScreenPayment /></DCArtboard>
      </DCSection>

      {/* Responsive tablet (the brief asks for one tablet variant of dashboard) */}
      <DCSection id="tablet" title="Tablet variant" subtitle="Dashboard at 1024 × 768 — two-column layout">
        <DCArtboard id="tablet-home" label="04 · Dashboard · Tablet (responsive)" width={1024} height={768}>
          <TabletDashboard />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// ─────────────────────────────────────────────────────────────
// Tablet dashboard variant — same data, 2-column layout
// ─────────────────────────────────────────────────────────────
function TabletDashboard() {
  return (
    <div style={{
      width: 1024, height: 768, background: TAG.bg, fontFamily: TAG.body,
      color: TAG.ink, padding: 40, boxSizing: 'border-box', display: 'flex', gap: 24,
    }}>
      {/* Left: sidebar */}
      <div style={{ width: 220, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: '#1B1408', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: TAG.display, fontWeight: 800, fontSize: 14, color: TAG.gold }}>TAG</div>
          <div>
            <div style={{ fontFamily: TAG.display, fontWeight: 700, fontSize: 14 }}>Vacation Club</div>
            <div style={{ fontSize: 11, color: TAG.muted }}>Member portal</div>
          </div>
        </div>
        {[
          { label: 'Home', icon: I.home, a: true },
          { label: 'Bookings', icon: I.calendar },
          { label: 'Offers', icon: I.gift },
          { label: 'Membership', icon: I.shield },
          { label: 'Wallet', icon: I.wallet },
          { label: 'Profile', icon: I.user },
        ].map((t, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 12,
            padding: '10px 14px', borderRadius: 12,
            background: t.a ? TAG.tealLight : 'transparent',
            color: t.a ? TAG.teal : TAG.inkSoft,
            fontFamily: TAG.display, fontWeight: 600, fontSize: 14,
          }}>
            <Icon d={t.icon} size={18} color={t.a ? TAG.teal : TAG.inkSoft} stroke={t.a ? 2 : 1.7}/>
            {t.label}
          </div>
        ))}
      </div>

      {/* Right: main */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 16, overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: TAG.muted }}>Namaste 👋</div>
            <div style={{ fontFamily: TAG.display, fontWeight: 800, fontSize: 24, letterSpacing: -0.5 }}>Rahul Singh</div>
          </div>
          <div style={{ background: '#fff', padding: '8px 14px', borderRadius: 12, border: '1px solid ' + TAG.hairline, display: 'flex', alignItems: 'center', gap: 8, fontFamily: TAG.body, fontSize: 13, color: TAG.muted }}>
            <Icon d={I.search} size={14} color={TAG.muted} /> Search resorts, offers...
          </div>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: '#fff', border: '1px solid ' + TAG.hairline, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon d={I.bell} size={18} color={TAG.ink}/>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16 }}>
          {/* Featured */}
          <Photo kind="udaipur" height={260} radius={20}>
            <div style={{ position: 'absolute', top: 16, left: 16 }}>
              <Pill color="#1B1408" bg="rgba(212,162,76,0.95)">★ Featured · Diwali Special</Pill>
            </div>
            <div style={{ position: 'absolute', bottom: 18, left: 18, right: 18, color: '#fff' }}>
              <div style={{ fontFamily: TAG.display, fontWeight: 800, fontSize: 22, letterSpacing: -0.4 }}>TAG Lake Pavilion, Udaipur</div>
              <div style={{ fontSize: 12, opacity: 0.9, marginTop: 2 }}>3 nights from ₹6,800/night · breakfast included</div>
            </div>
          </Photo>

          {/* Membership card */}
          <div style={{
            borderRadius: 20, padding: 18, position: 'relative', overflow: 'hidden',
            background: 'linear-gradient(135deg, ' + TAG.teal + ' 0%, ' + TAG.tealDark + ' 100%)',
          }}>
            <div style={{ fontSize: 10, color: TAG.gold, fontFamily: 'ui-monospace, Menlo', letterSpacing: 2 }}>TAG · GOLD</div>
            <div style={{ fontFamily: TAG.display, fontWeight: 800, fontSize: 20, color: '#fff', letterSpacing: -0.4, marginTop: 4 }}>10-Year Membership</div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '3px 8px', borderRadius: 999, background: 'rgba(46,158,110,0.25)', marginTop: 8 }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: TAG.success }} />
              <span style={{ fontSize: 11, color: '#7FE5B6', fontFamily: TAG.display, fontWeight: 600 }}>Active · 2036</span>
            </div>
            <div style={{ marginTop: 22, fontFamily: 'ui-monospace, Menlo', fontSize: 13, color: '#fff', letterSpacing: 1.5 }}>TAG · 1024 · 738</div>
          </div>
        </div>

        {/* Quick tiles */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
          {[
            { label: 'Book a Stay', icon: I.search, bg: TAG.teal, fg: '#fff' },
            { label: 'My Bookings', icon: I.calendar, bg: '#fff', fg: TAG.ink },
            { label: 'Offers', icon: I.gift, bg: TAG.gold, fg: '#1B1408' },
            { label: 'Refer & Earn', icon: I.users, bg: '#fff', fg: TAG.ink },
          ].map((t, i) => (
            <div key={i} style={{
              background: t.bg, borderRadius: 16, padding: 14, height: 86,
              display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              border: t.bg === '#fff' ? '1px solid ' + TAG.hairline : 'none',
              boxShadow: t.bg !== '#fff' ? '0 4px 12px rgba(0,0,0,0.08)' : 'none',
            }}>
              <Icon d={t.icon} size={20} color={t.fg} stroke={1.8} />
              <div style={{ fontFamily: TAG.display, fontWeight: 700, fontSize: 14, color: t.fg }}>{t.label}</div>
            </div>
          ))}
        </div>

        {/* Bottom stats */}
        <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1.5fr', gap: 16, flex: 1 }}>
          <Card padding={18}>
            <div style={{ fontSize: 11, color: TAG.muted, letterSpacing: 0.4, fontFamily: TAG.display, fontWeight: 600, textTransform: 'uppercase' }}>Holiday Balance</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginTop: 14 }}>
              <div style={{ position: 'relative', width: 74, height: 74 }}>
                <svg width="74" height="74" viewBox="0 0 74 74">
                  <circle cx="37" cy="37" r="30" fill="none" stroke="#F2EDE3" strokeWidth="7"/>
                  <circle cx="37" cy="37" r="30" fill="none" stroke={TAG.teal} strokeWidth="7"
                    strokeDasharray={2 * Math.PI * 30}
                    strokeDashoffset={2 * Math.PI * 30 * 0.97}
                    strokeLinecap="round" transform="rotate(-90 37 37)"/>
                </svg>
                <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: TAG.display, fontWeight: 800, fontSize: 16 }}>0.2</div>
              </div>
              <div>
                <div style={{ fontFamily: TAG.display, fontWeight: 800, fontSize: 22 }}>0.2 days</div>
                <div style={{ fontSize: 12, color: TAG.muted }}>5.8 of 6 nights used this year</div>
              </div>
            </div>
          </Card>
          <Card padding={0} style={{ overflow: 'hidden' }}>
            <div style={{ padding: '14px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 11, color: TAG.muted, letterSpacing: 0.4, fontFamily: TAG.display, fontWeight: 600, textTransform: 'uppercase' }}>Upcoming Holiday</div>
              <Pill color={TAG.success}>● Confirmed</Pill>
            </div>
            <div style={{ display: 'flex', gap: 14, padding: '0 18px 16px', alignItems: 'center' }}>
              <Photo kind="manali" height={80} radius={14} style={{ width: 100 }} label={false}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: TAG.display, fontWeight: 700, fontSize: 16 }}>TAG Snow Peaks, Manali</div>
                <div style={{ fontSize: 12, color: TAG.muted, marginTop: 2 }}>4 nights · 2 adults, 1 kid · Suite</div>
                <div style={{ fontSize: 11, color: TAG.gold, fontFamily: 'ui-monospace, Menlo', letterSpacing: 1, marginTop: 6 }}>14 — 18 DEC · IN 21 DAYS</div>
              </div>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
