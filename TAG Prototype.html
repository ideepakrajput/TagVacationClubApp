<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TAG Vacation Club · Prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0F8585"/>
        <stop offset="100%" stop-color="#074B4B"/>
      </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#bg)"/>
    <rect x="60" y="55" width="80" height="120" rx="14" fill="#1B1408" stroke="#D4A24C" stroke-width="1.5"/>
    <text x="100" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="#D4A24C" letter-spacing="-0.5">TAG</text>
    <line x1="80" y1="118" x2="120" y2="118" stroke="#D4A24C" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fff" opacity="0.7">Vacation Club</text>
  </svg>
</template>

<style>
  :root {
    --bg: #1A1614;
    --bg2: #221C18;
    --panel: rgba(255,255,255,0.04);
    --hairline: rgba(255,255,255,0.08);
    --ink: #F2EDE3;
    --muted: rgba(242,237,227,0.55);
    --gold: #D4A24C;
    --teal: #4FB0B0;
    --coral: #FF6B5B;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(120% 80% at 50% 0%, #2E2520 0%, transparent 60%),
      radial-gradient(80% 60% at 100% 100%, rgba(212,162,76,0.06) 0%, transparent 60%),
      var(--bg);
    min-height: 100vh; overflow: hidden;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tag-system.jsx"></script>
<script type="text/babel" src="tag-screens-1.jsx"></script>
<script type="text/babel" src="tag-screens-2.jsx"></script>
<script type="text/babel" src="tag-screens-3.jsx"></script>
<script type="text/babel" src="tag-prototype.jsx"></script>

<script type="text/babel" data-presets="env,react">

const SCREENS = [
  { id: 'splash',     name: 'Splash',              group: 'Entry',     render: () => <ScreenSplash /> },
  { id: 'ob1',        name: 'Onboarding · Resorts', group: 'Entry',    render: () => <ScreenOnboarding slide={1} /> },
  { id: 'ob2',        name: 'Onboarding · Flexibility', group: 'Entry', render: () => <ScreenOnboarding slide={2} /> },
  { id: 'ob3',        name: 'Onboarding · Privileges',  group: 'Entry', render: () => <ScreenOnboarding slide={3} /> },
  { id: 'login',      name: 'Sign in',             group: 'Entry',     render: () => <ScreenLogin /> },
  { id: 'dash',       name: 'Dashboard',           group: 'Home',      render: () => <ScreenDashboard /> },
  { id: 'dash-dark',  name: 'Dashboard · Dark',    group: 'Home',      render: () => <ScreenDashboard dark /> },
  { id: 'search',     name: 'Search',              group: 'Booking',   render: () => <ScreenBookSearch /> },
  { id: 'list',       name: 'Resort list',         group: 'Booking',   render: () => <ScreenBookList /> },
  { id: 'detail',     name: 'Resort detail',       group: 'Booking',   render: () => <ScreenResortDetail /> },
  { id: 'summary',    name: 'Booking summary',     group: 'Booking',   render: () => <ScreenBookSummary /> },
  { id: 'confirm',    name: 'Confirmation',        group: 'Booking',   render: () => <ScreenBookConfirm /> },
  { id: 'trips',      name: 'My trips',            group: 'Member',    render: () => <ScreenMyBookings /> },
  { id: 'offers',     name: 'Offers',              group: 'Member',    render: () => <ScreenOffers /> },
  { id: 'profile',    name: 'Profile',             group: 'Member',    render: () => <ScreenProfile /> },
  { id: 'member',     name: 'Membership details',  group: 'Member',    render: () => <ScreenMembershipDetails /> },
  { id: 'package',    name: 'Package & usage',     group: 'Member',    render: () => <ScreenPackageUsage /> },
  { id: 'payment',    name: 'Payment & wallet',    group: 'Member',    render: () => <ScreenPayment /> },
  { id: 'ekit',       name: 'E-Kit & documents',   group: 'Member',    render: () => <ScreenEKit /> },
];

const GROUPS = ['Entry', 'Home', 'Booking', 'Member'];

function App() {
  // Sync index with URL hash so links share to a specific screen
  const fromHash = () => {
    const h = (location.hash || '').replace('#', '');
    const i = SCREENS.findIndex(s => s.id === h);
    return i >= 0 ? i : 0;
  };
  const [idx, setIdx] = React.useState(fromHash());
  const [dir, setDir] = React.useState(1);
  const [navOpen, setNavOpen] = React.useState(false);
  const [showHint, setShowHint] = React.useState(true);
  const [scale, setScale] = React.useState(1);

  // Update URL hash and clamp idx
  React.useEffect(() => {
    location.hash = SCREENS[idx].id;
  }, [idx]);

  // Hash-change listener (back/forward)
  React.useEffect(() => {
    const onHash = () => setIdx(fromHash());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Keyboard
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'Escape') setNavOpen(false);
      if (e.key === 'g' || e.key === 'G') setNavOpen(o => !o);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [idx]);

  // Auto-fit scale to viewport
  React.useEffect(() => {
    const fit = () => {
      const availH = window.innerHeight - 200; // header + footer
      const availW = window.innerWidth - 480; // sidebar + padding
      const s = Math.min(availH / 844, availW / 390, 1);
      setScale(Math.max(0.45, s));
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  // Auto-hide hint
  React.useEffect(() => {
    const t = setTimeout(() => setShowHint(false), 4500);
    return () => clearTimeout(t);
  }, []);

  const go = (d) => {
    setDir(d);
    setIdx(i => (i + d + SCREENS.length) % SCREENS.length);
  };

  const cur = SCREENS[idx];

  return (
    <div style={{
      width: '100vw', height: '100vh', position: 'relative', overflow: 'hidden',
      display: 'flex', flexDirection: 'column',
    }}>

      {/* HEADER */}
      <div style={{
        padding: '18px 28px', display: 'flex', alignItems: 'center', gap: 14,
        borderBottom: '1px solid var(--hairline)', flexShrink: 0,
        background: 'rgba(0,0,0,0.18)', backdropFilter: 'blur(12px)',
      }}>
        <div style={{
          width: 40, height: 40, borderRadius: 12,
          background: '#1B1408', display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative', flexShrink: 0,
        }}>
          <span style={{ fontFamily: '"Plus Jakarta Sans", system-ui', fontWeight: 800, fontSize: 16, color: 'var(--gold)', letterSpacing: -0.4 }}>TAG</span>
          <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 18, height: 1, background: 'var(--gold)', opacity: 0.7 }} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: '"Plus Jakarta Sans"', fontWeight: 700, fontSize: 15, color: 'var(--ink)', letterSpacing: -0.2 }}>TAG Vacation Club</div>
          <div style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'ui-monospace, Menlo, monospace', letterSpacing: 0.5 }}>MOBILE APP · INTERACTIVE PROTOTYPE · v1.0</div>
        </div>

        {/* Hint */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 14,
          padding: '6px 12px', borderRadius: 999,
          background: 'rgba(255,255,255,0.04)', border: '1px solid var(--hairline)',
          fontSize: 11, color: 'var(--muted)', fontFamily: '"Plus Jakarta Sans"', fontWeight: 500,
        }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <kbd style={kbdStyle}>←</kbd> <kbd style={kbdStyle}>→</kbd> Navigate
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <kbd style={kbdStyle}>G</kbd> Screens
          </span>
        </div>

        <button onClick={() => setNavOpen(true)} style={{
          padding: '8px 14px', borderRadius: 10,
          background: 'var(--gold)', color: '#1B1408', border: 'none',
          fontFamily: '"Plus Jakarta Sans"', fontWeight: 700, fontSize: 13,
          cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          All screens · {SCREENS.length}
        </button>
      </div>

      {/* MAIN STAGE */}
      <div style={{ flex: 1, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>

        {/* Left arrow */}
        <button onClick={() => go(-1)} style={{ ...arrowStyle, left: 32 }} aria-label="Previous">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>

        {/* Phone — wrapped in iOS frame */}
        <div style={{
          position: 'relative',
          width: 402 * scale, height: 874 * scale,
          transition: 'width .25s, height .25s',
        }}>
          <div style={{
            transform: `scale(${scale})`, transformOrigin: 'top left',
            width: 402, height: 874, position: 'relative',
          }}>
            <IOSDevice width={402} height={874}>
              <div key={cur.id} style={{
                width: '100%', height: '100%',
                animation: `slideIn${dir > 0 ? 'R' : 'L'} 0.35s cubic-bezier(.2,.7,.3,1)`,
              }}>
                {cur.render()}
              </div>
            </IOSDevice>

            {/* Edge tap zones inside phone */}
            <div onClick={() => go(-1)} style={{
              position: 'absolute', left: 12, top: 80, bottom: 80, width: 60,
              cursor: 'pointer', zIndex: 999,
            }} title="Previous screen"/>
            <div onClick={() => go(1)} style={{
              position: 'absolute', right: 12, top: 80, bottom: 80, width: 60,
              cursor: 'pointer', zIndex: 999,
            }} title="Next screen"/>
          </div>
        </div>

        {/* Right arrow */}
        <button onClick={() => go(1)} style={{ ...arrowStyle, right: 32 }} aria-label="Next">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </button>

        {/* First-load hint */}
        {showHint && (
          <div style={{
            position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)',
            padding: '8px 14px', borderRadius: 999, background: 'rgba(212,162,76,0.95)',
            color: '#1B1408', fontFamily: '"Plus Jakarta Sans"', fontWeight: 700, fontSize: 12,
            display: 'flex', alignItems: 'center', gap: 6, boxShadow: '0 10px 24px rgba(0,0,0,0.4)',
            animation: 'fade .35s ease-out',
          }}>
            👉 Tap the edges of the phone, or use ← → keys
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{
        padding: '14px 28px', display: 'flex', alignItems: 'center', gap: 18,
        borderTop: '1px solid var(--hairline)', flexShrink: 0,
        background: 'rgba(0,0,0,0.24)', backdropFilter: 'blur(12px)',
      }}>
        <div style={{ minWidth: 180 }}>
          <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'ui-monospace, Menlo', letterSpacing: 1.2 }}>
            {String(idx + 1).padStart(2, '0')} / {SCREENS.length} · {cur.group.toUpperCase()}
          </div>
          <div style={{ fontFamily: '"Plus Jakarta Sans"', fontWeight: 700, fontSize: 16, color: 'var(--ink)', letterSpacing: -0.3 }}>{cur.name}</div>
        </div>

        {/* Progress dots — one per screen */}
        <div style={{ flex: 1, display: 'flex', gap: 4, overflowX: 'auto', justifyContent: 'center' }}>
          {SCREENS.map((s, i) => (
            <div key={s.id} onClick={() => { setDir(i > idx ? 1 : -1); setIdx(i); }} style={{
              width: i === idx ? 28 : 8, height: 6, borderRadius: 3,
              background: i === idx ? 'var(--gold)' : (s.group === cur.group ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.08)'),
              cursor: 'pointer', transition: 'width .25s, background .15s', flexShrink: 0,
            }} title={s.name} />
          ))}
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={() => go(-1)} style={footerBtn}>← Back</button>
          <button onClick={() => go(1)} style={{ ...footerBtn, background: 'var(--coral)', color: '#fff', borderColor: 'transparent' }}>Next →</button>
        </div>
      </div>

      {/* SCREEN PICKER OVERLAY */}
      {navOpen && (
        <div onClick={() => setNavOpen(false)} style={{
          position: 'fixed', inset: 0, zIndex: 10000,
          background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(14px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 32,
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: 'var(--bg2)', borderRadius: 22, width: '100%', maxWidth: 1100,
            maxHeight: '85vh', overflow: 'auto', padding: 32,
            border: '1px solid var(--hairline)',
            boxShadow: '0 40px 80px rgba(0,0,0,0.6)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
              <div>
                <div style={{ fontFamily: '"Plus Jakarta Sans"', fontWeight: 800, fontSize: 22, color: 'var(--ink)', letterSpacing: -0.4 }}>Jump to any screen</div>
                <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{SCREENS.length} screens · click any thumbnail to navigate</div>
              </div>
              <button onClick={() => setNavOpen(false)} style={{
                width: 36, height: 36, borderRadius: 10, background: 'rgba(255,255,255,0.06)',
                border: '1px solid var(--hairline)', color: 'var(--ink)', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>

            {GROUPS.map(g => (
              <div key={g} style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 11, color: 'var(--gold)', fontFamily: 'ui-monospace, Menlo', letterSpacing: 2, textTransform: 'uppercase', marginBottom: 12 }}>{g}</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 14 }}>
                  {SCREENS.map((s, i) => s.group === g && (
                    <div key={s.id} onClick={() => { setDir(i > idx ? 1 : -1); setIdx(i); setNavOpen(false); }} style={{
                      cursor: 'pointer', borderRadius: 14, overflow: 'hidden',
                      border: i === idx ? '2px solid var(--gold)' : '1px solid var(--hairline)',
                      background: 'rgba(255,255,255,0.03)',
                      transition: 'transform .15s, border-color .15s',
                    }}>
                      <div style={{
                        height: 240, overflow: 'hidden', position: 'relative',
                        background: '#FAF7F2', borderBottom: '1px solid var(--hairline)',
                      }}>
                        <div style={{
                          transform: 'scale(0.46)', transformOrigin: 'top left',
                          width: 390, height: 844, pointerEvents: 'none',
                        }}>{s.render()}</div>
                      </div>
                      <div style={{ padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ fontSize: 10, color: 'var(--muted)', fontFamily: 'ui-monospace, Menlo' }}>{String(SCREENS.indexOf(s) + 1).padStart(2, '0')}</div>
                        <div style={{ flex: 1, fontFamily: '"Plus Jakarta Sans"', fontWeight: 600, fontSize: 13, color: 'var(--ink)' }}>{s.name}</div>
                        {i === idx && <div style={{ fontSize: 10, color: 'var(--gold)', fontFamily: '"Plus Jakarta Sans"', fontWeight: 700 }}>● HERE</div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <style>{`
        @keyframes slideInR { 0%{opacity:0;transform:translateX(24px)} 100%{opacity:1;transform:translateX(0)} }
        @keyframes slideInL { 0%{opacity:0;transform:translateX(-24px)} 100%{opacity:1;transform:translateX(0)} }
        @keyframes fade { 0%{opacity:0} 100%{opacity:1} }
        button:hover { filter: brightness(1.1); }
      `}</style>
    </div>
  );
}

const kbdStyle = {
  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
  minWidth: 20, height: 20, padding: '0 5px', borderRadius: 5,
  background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.12)',
  fontFamily: 'ui-monospace, Menlo', fontSize: 10, color: 'var(--ink)',
  fontWeight: 600,
};

const arrowStyle = {
  position: 'absolute', top: '50%', transform: 'translateY(-50%)',
  width: 56, height: 56, borderRadius: 28,
  background: 'rgba(255,255,255,0.06)', border: '1px solid var(--hairline)',
  color: 'var(--ink)', cursor: 'pointer', zIndex: 100,
  display: 'flex', alignItems: 'center', justifyContent: 'center',
  backdropFilter: 'blur(8px)',
};

const footerBtn = {
  padding: '8px 16px', borderRadius: 10,
  background: 'rgba(255,255,255,0.06)', color: 'var(--ink)',
  border: '1px solid var(--hairline)',
  fontFamily: '"Plus Jakarta Sans"', fontWeight: 600, fontSize: 13, cursor: 'pointer',
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
